services:
  - type: web
    name: file-vault
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "./bin/render-start.sh"
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        sync: false
      # Memory tuning for the 512MB free tier
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: BUNDLE_WITHOUT
        value: "development:test"
      # Public host used in mailer links (set to the deployed URL, e.g. file-vault.onrender.com)
      - key: APP_HOST
        sync: false
      # Cloudinary (Active Storage)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
